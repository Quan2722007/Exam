<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Đăng ký - Green Haven</title>
        <link rel="stylesheet" href="../../share/css/bootstrap.min.css" />
        <style>
            body {
                background-color: #f7f9f4;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .sign-card {
                width: 100%;
                max-width: 450px;
                border-radius: 15px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                border: none;
            }
        </style>
    </head>
    <body>
        <div class="card sign-card p-4 mx-3">
            <div class="text-center mb-4">
                <a href="../homepage/homepage.html">
                    <img src="../../assets/logo/logo.png" alt="Green Haven Logo" style="height: 60px" />
                </a>
                <h4 class="mt-3 fw-bold text-success">Đăng ký tài khoản</h4>
                <p class="text-muted" style="font-size: 0.9rem">Tham gia cùng cộng đồng Green Haven</p>
            </div>

            <form id="signForm">
                <div class="mb-3">
                    <label for="fullname" class="form-label fw-medium">Họ và tên</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-user-tag text-muted"></i></span>
                        <input type="text" class="form-control" id="fullname" placeholder="Nhập họ và tên..." required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="username" class="form-label fw-medium">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập..." required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-medium">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required />
                    </div>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-medium">Xác nhận mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-lock-check text-muted"></i></span>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Nhập lại mật khẩu..." required />
                    </div>
                </div>

                <button type="button" class="btn btn-success w-100 py-2 fw-bold" id="btnSign">Đăng ký</button>

                <div class="text-center mt-4">
                    Bạn đã có tài khoản?
                    <a href="../loginpage/loginpage.html" style="font-size: 0.9rem"> Đăng nhập </a>
                </div>
            </form>
        </div>

        <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
        <script src="../../share/js/bootstrap.min.js"></script>
        <script src="signuppage.js"></script>
    </body>
</html>
