<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Giỏ hàng - Green Haven</title>
        <link rel="stylesheet" href="addtocartpage.css" />
        <link rel="stylesheet" href="../../share/css/bootstrap.min.css" />
        <link rel="stylesheet" href="../../component/header/header.css" />
        <link rel="stylesheet" href="../../component/footer/footer.css" />
        <link rel="stylesheet" href="../../share/css/share.css" />
        <link rel="stylesheet" href="../../component/btn/btn.css" />
    </head>
    <body>
        <header></header>

        <main>
            <div class="container">
                <a href="../homepage/homepage.html" class="btnPrev d-flex align-items-center"><i class="fa-solid fa-arrow-left-long"></i> Quay lại</a>
                <div class="titlePage">Giỏ hàng của bạn</div>
            </div>
            <section class="section container">
                <div class="table-responsive shadow-sm rounded">
                    <table class="table table-bordered align-middle text-center m-0">
                        <thead class="table-success">
                            <tr>
                                <th scope="col">Hình ảnh</th>
                                <th scope="col">Tên cây</th>
                                <th scope="col">Đơn giá</th>
                                <th scope="col" style="width: 150px">Số lượng</th>
                                <th scope="col">Thành tiền</th>
                                <th scope="col">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="cartTableBody">
                            <tr>
                                <td>
                                    <img src="../../assets/anhCay/cayNguGiaBi.png" alt="Cây ngũ gia bì" class="img-fluid rounded" style="width: 80px; height: 80px; object-fit: cover" />
                                </td>
                                <td class="fw-bold">Cây ngũ gia bì</td>
                                <td>220.000đ</td>
                                <td>
                                    <input type="number" class="form-control text-center" value="1" min="1" />
                                </td>
                                <td class="text-danger fw-bold">220.000đ</td>
                                <td>
                                    <button class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="d-flex flex-column align-items-start mt-4 gap-3">
                    <h4 class="mb-3">Tổng cộng: <span class="text-danger fw-bold" id="totalCartPrice">220.000đ</span></h4>
                    <div class="d-flex justify-content-center text-center w-100 w-md-auto">
                        <button class="btn btn-success btn-lg px-5 w-md-auto btnBuy">Thanh toán</button>
                    </div>
                </div>
            </section>
        </main>

        <footer></footer>

        <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
        <script src="../../share/js/bootstrap.min.js"></script>
        <script src="../../component/header/header.js"></script>
        <script src="../../component/footer/footer.js"></script>
        <script src="addtocartpage.js"></script>
    </body>
</html>
