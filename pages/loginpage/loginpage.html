<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Đăng nhập - Green Haven</title>
        <link rel="stylesheet" href="../../share/css/bootstrap.min.css" />
        <link rel="stylesheet" href="loginpage.css" />
        <style></style>
    </head>
    <body>
        <div class="card login-card p-4 mx-3">
            <div class="text-center mb-4">
                <a href="../homepage/homepage.html">
                    <img src="../../assets/logo/logo.png" alt="Green Haven Logo" style="height: 60px" />
                </a>
                <h4 class="mt-3 fw-bold text-success">Đăng nhập</h4>
                <p class="text-muted" style="font-size: 0.9rem">Chào mừng bạn quay lại với Green Haven</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label fw-medium">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-user text-muted"></i></span>
                        <input type="text" class="form-control" id="username" placeholder="Nhập tên đăng nhập..." required />
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-medium">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu..." required />
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <a href="#" class="text-success text-decoration-none" style="font-size: 0.9rem">Quên mật khẩu?</a>
                </div>

                <button type="button" class="btn btn-success w-100 py-2 fw-bold" id="btnLogin">Đăng nhập</button>

                <div class="text-center mt-4">
                    Nếu bạn chưa có tài khoản, hãy
                    <a href="../signuppage/signuppage.html" class="" style="font-size: 0.9rem"> Đăng ký </a>
                </div>
            </form>
        </div>

        <script src="https://kit.fontawesome.com/c4edd7a73c.js" crossorigin="anonymous"></script>
        <script src="../../share/js/bootstrap.min.js"></script>
        <script src="loginpage.js"></script>
    </body>
</html>
